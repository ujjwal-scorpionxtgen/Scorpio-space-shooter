<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Scorpio Space Shooter - An addictive offline/online HTML5 game">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;">
    <link rel="manifest" href="manifest.json">
    <title>Scorpio Space Shooter - Enhanced Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            -webkit-font-smoothing: antialiased;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: optimizeSpeed;
            image-rendering: crisp-edges;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .game-stats {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        .health-bar {
            width: 150px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ffff);
            transition: width 0.2s ease;
        }

        .offline-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            background: rgba(255, 100, 100, 0.8);
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            z-index: 25;
        }

        .offline-indicator.active {
            display: block;
        }

        .game-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(15, 12, 41, 0.95), rgba(48, 43, 99, 0.95));
            z-index: 20;
        }

        .game-menu.hidden {
            display: none;
        }

        .game-title {
            font-size: 2.6rem;
            font-weight: 900;
            margin-bottom: 20px;
            color: #00ffff;
            letter-spacing: 3px;
            text-align: center;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(45deg, #4a00e0, #8e2de2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(142, 45, 226, 0.6);
        }

        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20;
        }

        .game-over-screen.active {
            display: flex;
        }

        .game-over-title {
            font-size: 3rem;
            color: #ff3366;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 1.5rem;
            color: #00ffff;
            margin-bottom: 30px;
        }

        .power-up-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .power-up-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .power-up-icon.active {
            opacity: 1;
            box-shadow: 0 0 15px currentColor;
        }

        .wave-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            white-space: nowrap;
        }

        .wave-indicator.show {
            animation: waveAnnounce 2s ease;
        }

        @keyframes waveAnnounce {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .combo-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: 700;
            color: #ffff00;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo-indicator.active {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="offline-indicator" id="offlineIndicator">📡 OFFLINE MODE</div>
        
        <div class="ui-overlay">
            <div class="game-stats">
                <div class="stat-item">SCORE: <span id="score">0</span></div>
                <div class="stat-item">
                    HEALTH <div class="health-bar"><div class="health-fill" id="healthBar" style="width: 100%"></div></div>
                </div>
                <div class="stat-item">WAVE: <span id="wave">1</span></div>
            </div>
            
            <div class="combo-indicator" id="comboIndicator">COMBO x<span id="comboCount">0</span></div>
            
            <div class="power-up-indicator">
                <div class="power-up-icon" id="rapidFire" style="background: #ff6b6b;">⚡</div>
                <div class="power-up-icon" id="shield" style="background: #4dabf7;">🛡️</div>
                <div class="power-up-icon" id="multiShot" style="background: #69db7c;">🔱</div>
                <div class="power-up-icon" id="speedBoost" style="background: #ffd43b;">💨</div>
            </div>
        </div>
        
        <div class="wave-indicator" id="waveIndicator">WAVE 1</div>
        
        <div class="game-menu" id="gameMenu">
            <h1 class="game-title">SCORPIO SPACE SHOOTER</h1>
            <div class="menu-buttons">
                <button class="game-btn" id="startBtn">START GAME</button>
                <button class="game-btn" id="settingsBtn">SETTINGS</button>
            </div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <h2 class="game-over-title">GAME OVER</h2>
            <p class="final-score">Final Score: <span id="finalScore">0</span></p>
            <button class="game-btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // ============================================================================
        // OPTIMIZED GAME ENGINE WITH SECURITY & OFFLINE SUPPORT
        // ============================================================================

        // Offline detection
        const offlineIndicator = document.getElementById('offlineIndicator');
        window.addEventListener('online', () => offlineIndicator.classList.remove('active'));
        window.addEventListener('offline', () => offlineIndicator.classList.add('active'));

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => 
                console.warn('ServiceWorker registration failed')
            );
        }

        // Cached DOM elements for performance
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false, antialias: false });
        const scoreDisplay = document.getElementById('score');
        const waveDisplay = document.getElementById('wave');
        const healthBar = document.getElementById('healthBar');
        const gameMenu = document.getElementById('gameMenu');
        const gameOverScreen = document.getElementById('gameOverScreen');

        // Game state
        let gameRunning = false;
        let score = 0;
        let wave = 1;
        let combo = 0;
        let touchX = 0;
        let touchY = 0;
        let touchActive = false;

        // Performance variables
        let lastFrameTime = performance.now();
        const targetFPS = 60;

        // Object pools
        const pools = {};
        const poolConfigs = {
            bullets: 200,
            enemyBullets: 300,
            enemies: 50,
            particles: 500,
            powerUps: 20,
            explosions: 30
        };

        function initPools() {
            Object.keys(poolConfigs).forEach(poolType => {
                pools[poolType] = Array(poolConfigs[poolType]).fill(null).map(() => ({ active: false }));
            });
        }

        function getFromPool(poolType) {
            const pool = pools[poolType];
            for (let obj of pool) {
                if (!obj.active) {
                    obj.active = true;
                    return obj;
                }
            }
            const newObj = { active: true };
            pool.push(newObj);
            return newObj;
        }

        // Game objects
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 150,
            width: 60,
            height: 60,
            speed: 0.2,
            health: 100,
            maxHealth: 100,
            color: '#00ffff',
            fireRate: 5,
            fireCounter: 0,
            powerUps: { rapidFire: false, shield: false, multiShot: false, speedBoost: false },
            powerUpTimers: { rapidFire: 0, shield: 0, multiShot: 0, speedBoost: 0 }
        };

        let enemies = [];
        let bullets = [];
        let enemyBullets = [];
        let particles = [];
        let powerUps = [];
        let stars = [];
        let boss = null;

        function initStars() {
            stars = Array(100).fill(null).map(() => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 2 + 0.5,
                brightness: Math.random()
            }));
        }

        const enemyTypes = {
            basic: { width: 40, height: 40, health: 2, speed: 2, color: '#ff6b6b', points: 10, fireRate: 100 },
            insect: { width: 45, height: 35, health: 3, speed: 2.5, color: '#ffd43b', points: 20, fireRate: 80 },
            mechanical: { width: 60, height: 60, health: 8, speed: 1.5, color: '#845ef7', points: 50, fireRate: 60 },
            shooter: { width: 50, height: 50, health: 5, speed: 1, color: '#ff00ff', points: 30, fireRate: 40 }
        };

        const bossTypes = {
            destroyer: { width: 200, height: 200, health: 100, speed: 0.5, color: '#ff3366', points: 500, fireRate: 20, name: 'GALACTIC DESTROYER' },
            mothership: { width: 250, height: 150, health: 150, speed: 0.3, color: '#ff00ff', points: 750, fireRate: 15, name: 'MOTHERSHIP' }
        };

        function getWaveTier(w) {
            if (w <= 10) return 'beginner';
            if (w <= 25) return 'normal';
            if (w <= 50) return 'hard';
            if (w <= 99) return 'nightmare';
            return 'infinite';
        }

        function createWave() {
            enemies = [];
            boss = null;

            const tier = getWaveTier(wave);
            const baseCount = { beginner: 5 + wave * 2, normal: 15 + wave * 2, hard: 20 + wave * 1.5, nightmare: 25 + wave * 1.2, infinite: 30 + wave * 0.8 }[tier];
            const enemyCount = Math.min(Math.floor(baseCount), 40);
            const diffMult = 1 + wave * 0.18;
            const speedCap = { beginner: 4, normal: 6, hard: 8, nightmare: 10, infinite: 12 }[tier];

            for (let i = 0; i < enemyCount; i++) {
                const types = Object.keys(enemyTypes);
                const type = types[Math.floor(Math.random() * types.length)];
                const data = enemyTypes[type];
                
                enemies.push({
                    x: Math.random() * (canvas.width - data.width),
                    y: -50,
                    ...data,
                    health: Math.ceil(data.health * diffMult),
                    maxHealth: Math.ceil(data.health * diffMult),
                    speed: Math.min(data.speed * (1 + wave * 0.05), speedCap),
                    points: Math.floor(data.points * diffMult),
                    fireCounter: 0,
                    active: true
                });
            }

            // Boss spawn
            const bossInterval = { beginner: 5, normal: 4, hard: 3, nightmare: 2, infinite: 1 }[tier];
            if (wave % bossInterval === 0) {
                const bossType = wave % 10 === 0 ? 'mothership' : 'destroyer';
                const bossData = bossTypes[bossType];
                boss = {
                    x: canvas.width / 2 - bossData.width / 2,
                    y: 100,
                    ...bossData,
                    maxHealth: bossData.health,
                    fireCounter: 0,
                    active: true
                };
            }

            const waveIndicator = document.getElementById('waveIndicator');
            waveIndicator.textContent = `WAVE ${wave}`;
            waveIndicator.classList.add('show');
            setTimeout(() => waveIndicator.classList.remove('show'), 2000);
        }

        function updateHealthBar() {
            healthBar.style.width = (player.health / player.maxHealth) * 100 + '%';
        }

        // Input handling
        document.addEventListener('touchstart', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            touchX = Math.max(0, Math.min(touch.clientX, canvas.width));
            touchY = Math.max(0, Math.min(touch.clientY, canvas.height));
            touchActive = true;
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            touchX = Math.max(0, Math.min(touch.clientX, canvas.width));
            touchY = Math.max(0, Math.min(touch.clientY, canvas.height));
        }, { passive: false });

        document.addEventListener('touchend', () => { touchActive = false; }, { passive: false });

        // Button events
        document.getElementById('startBtn').addEventListener('click', () => {
            gameRunning = true;
            gameMenu.classList.add('hidden');
            initPools();
            initStars();
            player.health = 100;
            score = 0;
            wave = 1;
            combo = 0;
            updateHealthBar();
            createWave();
            gameLoop();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            gameOverScreen.classList.remove('active');
            document.getElementById('startBtn').click();
        });

        document.getElementById('settingsBtn').addEventListener('click', () => {
            alert('Settings: Sound and Vibration ON');
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width / 2;
            player.y = canvas.height - 150;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            const now = performance.now();
            const deltaTime = Math.min(now - lastFrameTime, 50) / 1000;
            lastFrameTime = now;

            // Draw background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw stars
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) star.y = -5;
                ctx.globalAlpha = star.brightness;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            ctx.globalAlpha = 1;

            // Update player
            if (touchActive) {
                const dx = touchX - (player.x + player.width / 2);
                const dy = touchY - (player.y + player.height / 2);
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 10) {
                    player.x += (dx / dist) * player.speed * 10;
                    player.y += (dy / dist) * player.speed * 10;
                    player.x = Math.max(0, Math.min(player.x, canvas.width - player.width));
                    player.y = Math.max(0, Math.min(player.y, canvas.height - player.height));
                }
            }

            // Draw player ship
            ctx.fillStyle = player.powerUps.shield ? '#4dabf7' : player.color;
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            ctx.beginPath();
            ctx.moveTo(0, -player.height / 2);
            ctx.lineTo(player.width / 2, player.height / 2);
            ctx.lineTo(0, player.height / 3);
            ctx.lineTo(-player.width / 2, player.height / 2);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // Fire bullets
            player.fireCounter++;
            if (player.fireCounter >= player.fireRate) {
                if (player.powerUps.multiShot) {
                    [-15, 0, 15].forEach(angle => {
                        const rad = (angle * Math.PI) / 180;
                        const bullet = getFromPool('bullets');
                        Object.assign(bullet, { x: player.x + player.width / 2, y: player.y, vx: Math.sin(rad) * 8, vy: -10, active: true });
                        bullets.push(bullet);
                    });
                } else {
                    const bullet = getFromPool('bullets');
                    Object.assign(bullet, { x: player.x + player.width / 2, y: player.y, vx: 0, vy: -10, active: true });
                    bullets.push(bullet);
                }
                player.fireCounter = 0;
            }

            // Update bullets
            bullets = bullets.filter(b => {
                b.x += b.vx;
                b.y += b.vy;
                if (b.y < 0 || b.x < 0 || b.x > canvas.width) { b.active = false; return false; }
                ctx.fillStyle = '#00ffff';
                ctx.fillRect(b.x, b.y, 4, 10);
                return true;
            });

            // Update enemies
            enemies = enemies.filter(e => {
                e.y += e.speed;
                e.fireCounter++;

                if (e.fireCounter >= e.fireRate) {
                    const eBullet = getFromPool('enemyBullets');
                    Object.assign(eBullet, { x: e.x + e.width / 2, y: e.y + e.height, vx: 0, vy: 5, active: true });
                    enemyBullets.push(eBullet);
                    e.fireCounter = 0;
                }

                if (e.y > canvas.height) { e.active = false; return false; }
                
                ctx.fillStyle = e.color;
                ctx.fillRect(e.x, e.y, e.width, e.height);
                ctx.fillStyle = 'rgba(100, 255, 100, 0.8)';
                ctx.fillRect(e.x, e.y - 8, (e.health / e.maxHealth) * e.width, 4);
                return true;
            });

            // Enemy bullets
            enemyBullets = enemyBullets.filter(b => {
                b.y += b.vy;
                if (b.y > canvas.height) { b.active = false; return false; }
                ctx.fillStyle = '#ff3366';
                ctx.fillRect(b.x, b.y, 6, 6);
                return true;
            });

            // Collision detection
            bullets.forEach(b => {
                enemies.forEach(e => {
                    if (b.x < e.x + e.width && b.x + 4 > e.x && b.y < e.y + e.height && b.y + 10 > e.y) {
                        e.health--;
                        b.active = false;
                        if (e.health <= 0) { score += e.points; combo++; e.active = false; }
                    }
                });
            });

            enemyBullets.forEach(b => {
                if (b.x < player.x + player.width && b.x + 6 > player.x && b.y < player.y + player.height && b.y + 6 > player.y) {
                    if (!player.powerUps.shield) player.health -= 10;
                    b.active = false;
                }
            });

            // Draw boss
            if (boss && boss.active) {
                ctx.fillStyle = boss.color;
                ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
                ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                ctx.fillRect(boss.x, boss.y - 8, (boss.health / boss.maxHealth) * boss.width, 4);
            }

            // Update UI
            scoreDisplay.textContent = Math.floor(score);
            waveDisplay.textContent = wave;
            updateHealthBar();

            if (combo > 1) {
                document.getElementById('comboIndicator').classList.add('active');
                document.getElementById('comboCount').textContent = combo;
            } else {
                document.getElementById('comboIndicator').classList.remove('active');
            }

            // Game over
            if (player.health <= 0) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = Math.floor(score);
                gameOverScreen.classList.add('active');
            }

            // Next wave
            if (enemies.length === 0 && !boss) {
                wave++;
                createWave();
            }
        }

        // IndexedDB for offline storage
        let db;
        const dbRequest = indexedDB.open('ScorpioGameDB', 1);
        dbRequest.onsuccess = () => { db = dbRequest.result; };
        dbRequest.onupgradeneeded = () => { 
            db = dbRequest.result;
            if (!db.objectStoreNames.contains('scores')) {
                db.createObjectStore('scores', { autoIncrement: true });
            }
        };

        // Initialize
        initPools();
        initStars();
    </script>
</body>
</html>
