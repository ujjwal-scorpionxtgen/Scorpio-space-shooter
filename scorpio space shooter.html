<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpio Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Orbitron', 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            touch-action: none;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap');

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: optimizeSpeed;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: optimize-contrast;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .game-stats {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            width: fit-content;
            max-width: 260px;
        }

        .health-bar {
            width: 150px;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-left: 5px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ffff);
            transition: width 0.3s ease;
            border-radius: 5px;
            box-shadow: 0 0 10px #00ffff;
        }

        .boss-health-container {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            display: none;
        }

        .boss-name {
            text-align: center;
            margin-bottom: 5px;
            font-size: 18px;
            color: #ff3366;
            text-shadow: 0 0 10px #ff3366;
        }

        .boss-health-bar {
            width: 100%;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff3366;
        }

        .boss-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3366, #ff6699);
            transition: width 0.3s ease;
            border-radius: 8px;
            box-shadow: 0 0 15px #ff3366;
        }

        .game-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, rgba(15, 12, 41, 0.95), rgba(48, 43, 99, 0.95), rgba(36, 36, 62, 0.95));
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        .game-menu.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .game-title {
            font-size: 2.6rem;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            letter-spacing: 3px;
            animation: pulse 2s infinite alternate;
            text-align: center;
            padding: 0 15px;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .menu-subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #00ffff;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #4a00e0, #8e2de2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(142, 45, 226, 0.4);
            min-width: 200px;
        }

        .game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(142, 45, 226, 0.6);
        }

        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-over-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 20px;
            color: #ff3366;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #00ffff;
        }

        .power-up-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .power-up-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            opacity: 0.3;
            transition: all 0.3s ease;
        }

        .power-up-icon.active {
            opacity: 1;
            box-shadow: 0 0 15px currentColor;
            animation: powerUpPulse 1s infinite alternate;
        }

        @keyframes powerUpPulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .combo-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: 700;
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .combo-indicator.active {
            opacity: 1;
            animation: comboFlash 0.5s ease;
        }

        @keyframes comboFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .wave-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            white-space: nowrap;
            text-align: center;
        }

        .wave-indicator.show {
            animation: waveAnnounce 2s ease;
        }

        @keyframes waveAnnounce {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }
        }

        /* ── Settings Modal ── */
        .settings-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .settings-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .settings-panel {
            background: linear-gradient(135deg, rgba(15,12,41,0.98), rgba(48,43,99,0.98));
            border: 1px solid rgba(100,200,255,0.25);
            border-radius: 20px;
            padding: 30px 28px;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .settings-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: #00ffff;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .settings-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: #ccc;
        }
        .settings-icon { font-size: 20px; }
        /* Toggle switch */
        .toggle { position: relative; display: inline-block; width: 52px; height: 28px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #333;
            border-radius: 28px;
            transition: 0.3s;
        }
        .slider:before {
            position: absolute; content: "";
            height: 20px; width: 20px;
            left: 4px; bottom: 4px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .toggle input:checked + .slider { background: linear-gradient(45deg,#4a00e0,#8e2de2); }
        .toggle input:checked + .slider:before { transform: translateX(24px); }
        /* Volume slider */
        .volume-slider {
            -webkit-appearance: none;
            width: 130px; height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: linear-gradient(45deg,#4a00e0,#8e2de2);
            cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: linear-gradient(45deg,#4a00e0,#8e2de2);
            cursor: pointer; border: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-overlay">
            <div class="game-stats">
                <div class="stat-item">
                    <span>SCORE</span>
                    <span id="score">0</span>
                </div>
                <div class="stat-item">
                    <span>HEALTH</span>
                    <div class="health-bar">
                        <div class="health-fill" id="healthBar" style="width: 100%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <span>WAVE</span>
                    <span id="wave">1</span>
                </div>
            </div>
            
            <div class="boss-health-container" id="bossHealthContainer">
                <div class="boss-name" id="bossName">GALACTIC DESTROYER</div>
                <div class="boss-health-bar">
                    <div class="boss-health-fill" id="bossHealthBar" style="width: 100%"></div>
                </div>
            </div>
            
            <div class="combo-indicator" id="comboIndicator">
                COMBO x<span id="comboCount">0</span>
            </div>
            
            <div class="power-up-indicator">
                <div class="power-up-icon" id="rapidFire" style="background: #ff6b6b;">⚡</div>
                <div class="power-up-icon" id="shield" style="background: #4dabf7;">🛡️</div>
                <div class="power-up-icon" id="multiShot" style="background: #69db7c;">🔱</div>
                <div class="power-up-icon" id="speedBoost" style="background: #ffd43b;">💨</div>
            </div>
        </div>
        
        <div class="wave-indicator" id="waveIndicator">WAVE 1</div>
        
        <div class="game-menu" id="gameMenu">
            <h1 class="game-title">SCORPIO SPACE SHOOTER</h1>
            <p class="menu-subtitle">Touch and drag to control your ship</p>
            <div class="menu-buttons">
                <button class="game-btn" id="startBtn">START GAME</button>
                <button class="game-btn" id="settingsBtn">SETTINGS</button>
            </div>
        </div>
        
        <div class="game-over-screen" id="gameOverScreen">
            <h2 class="game-over-title">GAME OVER</h2>
            <p class="final-score">Final Score: <span id="finalScore">0</span></p>
            <button class="game-btn" id="restartBtn">PLAY AGAIN</button>
        </div>

        <!-- Settings Modal -->
        <div class="settings-overlay" id="settingsOverlay">
            <div class="settings-panel">
                <h2 class="settings-title">⚙️ SETTINGS</h2>

                <div class="settings-row">
                    <div class="settings-label">
                        <span class="settings-icon">🔫</span>
                        <span>Shoot Sound</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="sfxShoot" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="settings-row">
                    <div class="settings-label">
                        <span class="settings-icon">👾</span>
                        <span>Enemy Fire Sound</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="sfxEnemyFire" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="settings-row">
                    <div class="settings-label">
                        <span class="settings-icon">💥</span>
                        <span>Explosion Sound</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="sfxExplosion" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="settings-row">
                    <div class="settings-label">
                        <span class="settings-icon">📳</span>
                        <span>Haptic Vibration</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="haptics" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="settings-row">
                    <div class="settings-label">
                        <span class="settings-icon">🔊</span>
                        <span>Volume</span>
                    </div>
                    <input type="range" id="volume" min="0" max="100" value="60" class="volume-slider">
                </div>

                <button class="game-btn" id="settingsCloseBtn" style="margin-top:20px;">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game variables
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let wave = 1;
        let combo = 0;
        let comboTimer = 0;
        let touchActive = false;
        let touchX = canvas.width / 2;
        let touchY = canvas.height - 150;
        let waveTransitioning = false;
        
        // Performance optimization
        let lastTime = 0;
        let deltaTime = 0;
        const targetFPS = 60;
        const frameTime = 1000 / targetFPS;
        
        // Object pools
        const bulletPool = [];
        const enemyBulletPool = [];
        const enemyPool = [];
        const particlePool = [];
        const powerUpPool = [];
        const explosionPool = [];
        
        // Initialize object pools
        function initObjectPools() {
            // Bullet pool
            for (let i = 0; i < 200; i++) {
                bulletPool.push({
                    active: false,
                    x: 0,
                    y: 0,
                    vx: 0,
                    vy: 0,
                    width: 4,
                    height: 10,
                    color: '#00ffff',
                    damage: 1,
                    type: 'normal'
                });
            }
            
            // Enemy bullet pool
            for (let i = 0; i < 300; i++) {
                enemyBulletPool.push({
                    active: false,
                    x: 0,
                    y: 0,
                    vx: 0,
                    vy: 0,
                    width: 6,
                    height: 6,
                    color: '#ff3366',
                    damage: 1,
                    type: 'normal'
                });
            }
            
            // Enemy pool
            for (let i = 0; i < 50; i++) {
                enemyPool.push({
                    active: false,
                    x: 0,
                    y: 0,
                    width: 40,
                    height: 40,
                    health: 1,
                    maxHealth: 1,
                    speed: 2,
                    color: '#ff6b6b',
                    points: 10,
                    fireRate: 100,
                    fireCounter: 0,
                    pattern: 'straight',
                    patternOffset: 0,
                    type: 'basic'
                });
            }
            
            // Particle pool
            for (let i = 0; i < 500; i++) {
                particlePool.push({
                    active: false,
                    x: 0,
                    y: 0,
                    vx: 0,
                    vy: 0,
                    size: 2,
                    color: '#ffffff',
                    life: 30,
                    maxLife: 30
                });
            }
            
            // Power-up pool
            for (let i = 0; i < 20; i++) {
                powerUpPool.push({
                    active: false,
                    x: 0,
                    y: 0,
                    width: 30,
                    height: 30,
                    type: 'rapidFire',
                    color: '#ff6b6b',
                    icon: '⚡',
                    rotation: 0
                });
            }
            
            // Explosion pool
            for (let i = 0; i < 30; i++) {
                explosionPool.push({
                    active: false,
                    x: 0,
                    y: 0,
                    frame: 0,
                    maxFrames: 20,
                    size: 50,
                    color: '#ff6b6b'
                });
            }
        }
        
        // Get object from pool - expands pool if exhausted so game never silently crashes
        function getFromPool(pool) {
            for (let i = 0; i < pool.length; i++) {
                if (!pool[i].active) {
                    pool[i].active = true;
                    return pool[i];
                }
            }
            // Pool exhausted - create a new object matching pool type
            const template = Object.assign({}, pool[0]);
            template.active = true;
            pool.push(template);
            return template;
        }
        
        // Return object to pool
        function returnToPool(obj) {
            obj.active = false;
        }
        
        // Game objects
        let player = {
            x: canvas.width / 2,
            y: canvas.height - 150,
            width: 60,
            height: 60,
            speed: 0.2,
            health: 100,
            maxHealth: 100,
            color: '#00ffff',
            fireRate: 5,
            fireCounter: 0,
            powerUps: {
                rapidFire: false,
                shield: false,
                multiShot: false,
                speedBoost: false
            },
            powerUpTimers: {
                rapidFire: 0,
                shield: 0,
                multiShot: 0,
                speedBoost: 0
            }
        };
        
        let enemies = [];
        let enemyBullets = [];
        let bullets = [];
        let particles = [];
        let powerUps = [];
        let explosions = [];
        let stars = [];
        let boss = null;
        
        // Initialize stars for background
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 2 + 0.5,
                    brightness: Math.random()
                });
            }
        }
        
        // Enemy types
        const enemyTypes = {
            basic: {
                width: 40,
                height: 40,
                health: 2,
                speed: 2,
                color: '#ff6b6b',
                points: 10,
                fireRate: 100,
                pattern: 'straight'
            },
            insect: {
                width: 45,
                height: 35,
                health: 3,
                speed: 2.5,
                color: '#ffd43b',
                points: 20,
                fireRate: 80,
                pattern: 'zigzag'
            },
            mechanical: {
                width: 60,
                height: 60,
                health: 8,
                speed: 1.5,
                color: '#845ef7',
                points: 50,
                fireRate: 60,
                pattern: 'straight'
            },
            shooter: {
                width: 50,
                height: 50,
                health: 5,
                speed: 1,
                color: '#ff00ff',
                points: 30,
                fireRate: 40,
                pattern: 'circle'
            }
        };
        
        // Boss types
        const bossTypes = {
            destroyer: {
                width: 200,
                height: 200,
                health: 100,
                maxHealth: 100,
                speed: 0.5,
                color: '#ff3366',
                points: 500,
                fireRate: 20,
                pattern: 'boss',
                name: 'GALACTIC DESTROYER'
            },
            mothership: {
                width: 250,
                height: 150,
                health: 150,
                maxHealth: 150,
                speed: 0.3,
                color: '#ff00ff',
                points: 750,
                fireRate: 15,
                pattern: 'boss',
                name: 'MOTHERSHIP'
            }
        };
        
        // Power-up types
        const powerUpTypes = {
            rapidFire: {
                color: '#ff6b6b',
                icon: '⚡',
                duration: 300,
                effect: () => {
                    player.fireRate = 2;
                    player.powerUps.rapidFire = true;
                    document.getElementById('rapidFire').classList.add('active');
                }
            },
            shield: {
                color: '#4dabf7',
                icon: '🛡️',
                duration: 400,
                effect: () => {
                    player.powerUps.shield = true;
                    document.getElementById('shield').classList.add('active');
                }
            },
            multiShot: {
                color: '#69db7c',
                icon: '🔱',
                duration: 350,
                effect: () => {
                    player.powerUps.multiShot = true;
                    document.getElementById('multiShot').classList.add('active');
                }
            },
            speedBoost: {
                color: '#ffd43b',
                icon: '💨',
                duration: 300,
                effect: () => {
                    player.speed = 0.35;
                    player.powerUps.speedBoost = true;
                    document.getElementById('speedBoost').classList.add('active');
                }
            },
            health: {
                color: '#00ff88',
                icon: '❤️',
                duration: 0,
                effect: () => {
                    player.health = Math.min(player.health + 30, player.maxHealth);
                    updateHealthBar();
                }
            }
        };
        
        // ── Wave difficulty tiers ─────────────────────────────────────────
        // Wave 1-10:   Beginner  — slow ramp, basic/insect only early on
        // Wave 11-25:  Normal    — all types, faster, more enemies
        // Wave 26-50:  Hard      — elite versions, boss every 3 waves
        // Wave 51-99:  Nightmare — swarm mode, boss every 2 waves
        // Wave 100+:   Infinite  — max speed locked, boss EVERY wave, endless

        function getWaveTier(w) {
            if (w <= 10)  return 'beginner';
            if (w <= 25)  return 'normal';
            if (w <= 50)  return 'hard';
            if (w <= 99)  return 'nightmare';
            return 'infinite';
        }

        function getMilestoneLabel(w) {
            if (w === 10)  return '⚠️ WAVE 10 — DANGER ZONE';
            if (w === 25)  return '💀 WAVE 25 — HARD MODE';
            if (w === 50)  return '☠️ WAVE 50 — NIGHTMARE';
            if (w === 100) return '👾 WAVE 100 — INFINITE';
            if (w > 100 && (w % 25 === 0)) return `🔥 WAVE ${w} — STILL ALIVE?`;
            return `WAVE ${w}`;
        }

        function createWave() {
            enemies = [];
            boss = null;
            document.getElementById('bossHealthContainer').style.display = 'none';

            const tier = getWaveTier(wave);

            // ── Enemy count — scales up, capped at 40 to avoid lag
            const baseCount = {
                beginner:  5 + wave * 2,
                normal:    15 + wave * 2,
                hard:      20 + wave * 1.5,
                nightmare: 25 + wave * 1.2,
                infinite:  30 + wave * 0.8
            }[tier];
            const enemyCount = Math.min(Math.floor(baseCount), 40);

            // ── Difficulty multiplier — health & points scale
            const diffMult = 1 + wave * 0.18;

            // ── Speed cap so enemies don't become unhittable
            const speedCap = tier === 'beginner' ? 4 :
                             tier === 'normal'   ? 6 :
                             tier === 'hard'     ? 8 :
                             tier === 'nightmare'? 10 : 12;

            // ── Fire rate floor (lower = faster shooting), minimum 10
            const fireRateFloor = Math.max(10, 100 - wave * 2);

            // ── Show wave indicator with milestone labels
            const label = getMilestoneLabel(wave);
            const waveIndicator = document.getElementById('waveIndicator');
            waveIndicator.textContent = label;
            // Milestone waves get bigger text
            const isMilestone = [10,25,50,100].includes(wave) || (wave > 100 && wave % 25 === 0);
            waveIndicator.style.fontSize = isMilestone ? '2rem' : '2.8rem';
            waveIndicator.classList.add('show');
            setTimeout(() => waveIndicator.classList.remove('show'), isMilestone ? 3000 : 2000);

            // ── Type probability changes per tier
            function pickType() {
                const r = Math.random();
                if (tier === 'beginner') {
                    if (wave <= 3) return r < 0.8 ? 'basic' : 'insect';
                    if (wave <= 6) return r < 0.5 ? 'basic' : r < 0.8 ? 'insect' : 'shooter';
                    return r < 0.3 ? 'basic' : r < 0.6 ? 'insect' : r < 0.85 ? 'shooter' : 'mechanical';
                }
                if (tier === 'normal') {
                    return r < 0.2 ? 'basic' : r < 0.45 ? 'insect' : r < 0.7 ? 'shooter' : 'mechanical';
                }
                if (tier === 'hard') {
                    return r < 0.1 ? 'basic' : r < 0.3 ? 'insect' : r < 0.55 ? 'shooter' : 'mechanical';
                }
                // nightmare + infinite — mostly hard types
                return r < 0.05 ? 'basic' : r < 0.2 ? 'insect' : r < 0.45 ? 'shooter' : 'mechanical';
            }

            // ── Spawn enemies
            for (let i = 0; i < enemyCount; i++) {
                const type = pickType();
                const enemyData = enemyTypes[type];
                const enemy = getFromPool(enemyPool);

                enemy.x = Math.random() * (canvas.width - enemyData.width);
                enemy.y = -50 - Math.random() * Math.min(300 + wave * 10, 800);
                enemy.width = enemyData.width;
                enemy.height = enemyData.height;
                enemy.health = Math.ceil(enemyData.health * diffMult);
                enemy.maxHealth = enemy.health;
                enemy.speed = Math.min(enemyData.speed * (1 + wave * 0.05), speedCap);
                enemy.color = enemyData.color;
                enemy.points = Math.floor(enemyData.points * diffMult);
                enemy.fireRate = Math.max(enemyData.fireRate - wave * 1.5, fireRateFloor);
                enemy.fireCounter = Math.random() * enemy.fireRate;
                enemy.pattern = enemyData.pattern;
                enemy.patternOffset = Math.random() * Math.PI * 2;
                enemy.type = type;

                enemies.push(enemy);
            }

            // ── Boss spawn logic per tier
            // beginner: every 5 waves
            // normal:   every 4 waves
            // hard:     every 3 waves
            // nightmare:every 2 waves
            // infinite: every wave
            const bossInterval = {
                beginner:  5,
                normal:    4,
                hard:      3,
                nightmare: 2,
                infinite:  1
            }[tier];

            if (wave % bossInterval === 0) {
                // Wave 100+ alternates destroyer/mothership every wave
                // Otherwise: mothership on multiples of 10, destroyer otherwise
                let bossType;
                if (tier === 'infinite') {
                    bossType = wave % 2 === 0 ? 'mothership' : 'destroyer';
                } else {
                    bossType = wave % 10 === 0 ? 'mothership' : 'destroyer';
                }
                const bossData = bossTypes[bossType];

                boss = getFromPool(enemyPool);
                boss.x = canvas.width / 2 - bossData.width / 2;
                boss.y = -100;
                boss.width = bossData.width;
                boss.height = bossData.height;
                boss.health = Math.ceil(bossData.health * diffMult);
                boss.maxHealth = boss.health;
                boss.speed = Math.min(bossData.speed * (1 + wave * 0.03), 4);
                boss.color = bossData.color;
                boss.points = Math.floor(bossData.points * diffMult);
                boss.fireRate = Math.max(bossData.fireRate - wave * 0.5, 8);
                boss.fireCounter = 0;
                boss.pattern = bossData.pattern;
                boss.type = bossType;

                document.getElementById('bossName').textContent = bossData.name;
                document.getElementById('bossHealthContainer').style.display = 'block';
                updateBossHealthBar();
            }
        }
        
        // Auto-fire system
        function autoFire() {
            if (!touchActive) return;
            
            player.fireCounter--;
            
            if (player.fireCounter <= 0) {
                if (player.powerUps.multiShot) {
                    // 5-way spread shot
                    for (let i = -2; i <= 2; i++) {
                        const bullet = getFromPool(bulletPool);
                        bullet.x = player.x + player.width / 2 - 2;
                        bullet.y = player.y;
                        bullet.vx = i * 2;
                        bullet.vy = -10;
                        bullet.color = '#00ffff';
                        bullet.damage = 1;
                        bullets.push(bullet);
                    }
                } else {
                    // Normal shot
                    const bullet = getFromPool(bulletPool);
                    bullet.x = player.x + player.width / 2 - 2;
                    bullet.y = player.y;
                    bullet.vx = 0;
                    bullet.vy = -10;
                    bullet.color = '#00ffff';
                    bullet.damage = 1;
                    bullets.push(bullet);
                }
                
                player.fireCounter = player.fireRate;
                playShootSound();
            }
        }
        
        function update(currentTime) {
            // Calculate delta time for frame rate independent movement
            deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            if (!gameRunning || gamePaused) return;
            
            // Update stars
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                star.brightness = 0.5 + Math.sin(Date.now() * 0.001 * star.speed) * 0.5;
            });
            
            // Update player position (smooth follow touch)
            player.x += (touchX - player.width/2 - player.x) * player.speed;
            player.y += (touchY - player.height/2 - player.y) * player.speed;
            
            // Keep player in bounds
            player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
            player.y = Math.max(canvas.height / 2, Math.min(canvas.height - player.height - 20, player.y));
            
            // Auto fire
            autoFire();
            
            // Update bullets
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                if (bullet.y < -10 || bullet.x < -10 || bullet.x > canvas.width + 10) {
                    returnToPool(bullet);
                    return false;
                }
                return true;
            });
            
            // Update enemies - filter removes off-screen enemies so wave can complete
            enemies = enemies.filter(enemy => {
                // Movement patterns
                switch (enemy.pattern) {
                    case 'straight':
                        enemy.y += enemy.speed;
                        break;
                    case 'zigzag':
                        enemy.y += enemy.speed;
                        enemy.x += Math.sin(enemy.y * 0.02 + enemy.patternOffset) * 3;
                        break;
                    case 'circle':
                        enemy.y += enemy.speed;
                        enemy.x += Math.sin(Date.now() * 0.002 + enemy.patternOffset) * 2;
                        break;
                }
                
                // Remove enemies that passed off-screen bottom
                if (enemy.y > canvas.height + enemy.height) {
                    returnToPool(enemy);
                    return false;
                }
                
                // Enemy shooting
                enemy.fireCounter--;
                if (enemy.fireCounter <= 0 && enemy.y > 0 && enemy.y < canvas.height - 100) {
                    if (enemy.type === 'shooter') {
                        // 3-way shot
                        for (let i = -1; i <= 1; i++) {
                            const bullet = getFromPool(enemyBulletPool);
                            if (!bullet) continue;
                            bullet.x = enemy.x + enemy.width / 2 - 2;
                            bullet.y = enemy.y + enemy.height;
                            bullet.vx = i * 2;
                            bullet.vy = 5;
                            bullet.color = enemy.color;
                            bullet.width = 6;
                            bullet.height = 6;
                            enemyBullets.push(bullet);
                        }
                    } else {
                        // Normal shot
                        const bullet = getFromPool(enemyBulletPool);
                        if (bullet) {
                            bullet.x = enemy.x + enemy.width / 2 - 2;
                            bullet.y = enemy.y + enemy.height;
                            bullet.vx = 0;
                            bullet.vy = 5;
                            bullet.color = enemy.color;
                            bullet.width = 6;
                            bullet.height = 6;
                            enemyBullets.push(bullet);
                        }
                    }
                    enemy.fireCounter = enemy.fireRate;
                    playEnemyFireSound();
                }
                return true;
            });

            // Update boss
            if (boss) {
                // Boss movement
                if (boss.y < canvas.height / 4) {
                    boss.y += boss.speed;
                } else {
                    boss.x += Math.sin(Date.now() * 0.001) * 3;
                }
                
                // Boss shooting
                boss.fireCounter--;
                if (boss.fireCounter <= 0) {
                    if (boss.type === 'destroyer') {
                        // Spiral pattern
                        for (let i = 0; i < 8; i++) {
                            const angle = (Math.PI * 2 / 8) * i + Date.now() * 0.002;
                            const bullet = getFromPool(enemyBulletPool);
                            bullet.x = boss.x + boss.width / 2 - 2;
                            bullet.y = boss.y + boss.height / 2;
                            bullet.vx = Math.sin(angle) * 5;
                            bullet.vy = Math.cos(angle) * 5;
                            bullet.color = '#ff3366';
                            bullet.width = 8;
                            bullet.height = 8;
                            enemyBullets.push(bullet);
                        }
                    } else if (boss.type === 'mothership') {
                        // Spread shot
                        for (let i = -3; i <= 3; i++) {
                            const bullet = getFromPool(enemyBulletPool);
                            bullet.x = boss.x + boss.width / 2 - 2;
                            bullet.y = boss.y + boss.height;
                            bullet.vx = i * 3;
                            bullet.vy = 4;
                            bullet.color = '#ff00ff';
                            bullet.width = 6;
                            bullet.height = 6;
                            enemyBullets.push(bullet);
                        }
                    }
                    boss.fireCounter = boss.fireRate;
                }
            }
            
            // Update enemy bullets
            enemyBullets = enemyBullets.filter(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                if (bullet.y > canvas.height + 10 || bullet.x < -10 || bullet.x > canvas.width + 10) {
                    returnToPool(bullet);
                    return false;
                }
                return true;
            });
            
            // Update particles
            particles = particles.filter(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life--;
                
                if (particle.life <= 0) {
                    returnToPool(particle);
                    return false;
                }
                return true;
            });
            
            // Update explosions
            explosions = explosions.filter(explosion => {
                explosion.frame++;
                
                if (explosion.frame >= explosion.maxFrames) {
                    returnToPool(explosion);
                    return false;
                }
                return true;
            });
            
            // Update power-ups
            powerUps = powerUps.filter(powerUp => {
                powerUp.y += 2;
                powerUp.rotation += 0.05;
                
                if (powerUp.y > canvas.height + 20) {
                    returnToPool(powerUp);
                    return false;
                }
                return true;
            });
            
            // Update combo timer
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer === 0) {
                    combo = 0;
                    document.getElementById('comboIndicator').classList.remove('active');
                }
            }
            
            // Update power-up timers
            Object.keys(player.powerUpTimers).forEach(key => {
                if (player.powerUpTimers[key] > 0) {
                    player.powerUpTimers[key]--;
                    if (player.powerUpTimers[key] === 0) {
                        player.powerUps[key] = false;
                        document.getElementById(key).classList.remove('active');
                        
                        // Reset specific effects
                        if (key === 'rapidFire') {
                            player.fireRate = 5;
                        } else if (key === 'speedBoost') {
                            player.speed = 0.2;
                        }
                    }
                }
            });
            
            // Check collisions
            checkCollisions();
            
            // Check if wave is complete
            if (enemies.length === 0 && !boss && gameRunning && !waveTransitioning) {
                waveTransitioning = true;
                score += 100 * wave;
                updateScore();
                setTimeout(() => {
                    wave++;
                    document.getElementById('wave').textContent = wave;
                    createWave();
                    waveTransitioning = false;
                }, 1000);
            }
        }
        
        // Check collisions
        function checkCollisions() {
            // Bullets hitting enemies - iterate backwards to safely splice
            for (let bi = bullets.length - 1; bi >= 0; bi--) {
                const bullet = bullets[bi];
                let bulletUsed = false;

                // Check vs boss first
                if (boss && isColliding(bullet, boss)) {
                    boss.health -= bullet.damage;
                    createParticles(bullet.x, bullet.y, boss.color, 5);

                    if (boss.health <= 0) {
                        createExplosion(boss.x + boss.width/2, boss.y + boss.height/2, boss.color);
                        score += boss.points * (1 + combo * 0.1);
                        updateScore();
                        combo++;
                        comboTimer = 60;
                        updateCombo();
                        playBossDestroySound();
                        vibrate([100, 50, 100, 50, 200]);

                        for (let i = 0; i < 3; i++) {
                            const types = Object.keys(powerUpTypes);
                            const type = types[Math.floor(Math.random() * types.length)];
                            const powerUp = getFromPool(powerUpPool);
                            if (powerUp) {
                                powerUp.x = boss.x + boss.width/2 + (Math.random() - 0.5) * boss.width;
                                powerUp.y = boss.y + boss.height/2;
                                powerUp.type = type;
                                powerUp.color = powerUpTypes[type].color;
                                powerUp.icon = powerUpTypes[type].icon;
                                powerUps.push(powerUp);
                            }
                        }

                        returnToPool(boss);
                        boss = null;
                        document.getElementById('bossHealthContainer').style.display = 'none';
                    } else {
                        updateBossHealthBar();
                    }

                    returnToPool(bullet);
                    bullets.splice(bi, 1);
                    bulletUsed = true;
                }

                if (bulletUsed) continue;

                // Check vs enemies
                for (let ei = enemies.length - 1; ei >= 0; ei--) {
                    const enemy = enemies[ei];
                    if (isColliding(bullet, enemy)) {
                        enemy.health -= bullet.damage;
                        createParticles(bullet.x, bullet.y, enemy.color, 5);

                        if (enemy.health <= 0) {
                            createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color);
                            score += enemy.points * (1 + combo * 0.1);
                            updateScore();
                            combo++;
                            comboTimer = 60;
                            updateCombo();
                            playDestroySound();
                            vibrate(30);

                            if (Math.random() < 0.15) {
                                const types = Object.keys(powerUpTypes);
                                const type = types[Math.floor(Math.random() * types.length)];
                                const powerUp = getFromPool(powerUpPool);
                                if (powerUp) {
                                    powerUp.x = enemy.x + enemy.width/2;
                                    powerUp.y = enemy.y + enemy.height/2;
                                    powerUp.type = type;
                                    powerUp.color = powerUpTypes[type].color;
                                    powerUp.icon = powerUpTypes[type].icon;
                                    powerUps.push(powerUp);
                                }
                            }

                            returnToPool(enemy);
                            enemies.splice(ei, 1);
                        }

                        returnToPool(bullet);
                        bullets.splice(bi, 1);
                        bulletUsed = true;
                        break;
                    }
                }
            }

            // Enemy bullets hitting player
            for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
                const bullet = enemyBullets[bi];
                if (isColliding(bullet, player)) {
                    if (!player.powerUps.shield) {
                        player.health -= bullet.damage * 10;
                        updateHealthBar();
                        createParticles(bullet.x, bullet.y, '#ff3366', 10);
                        vibrate(60);
                        if (player.health <= 0) { gameOver(); return; }
                    } else {
                        createParticles(bullet.x, bullet.y, '#4dabf7', 5);
                    }
                    returnToPool(bullet);
                    enemyBullets.splice(bi, 1);
                }
            }

            // Enemies hitting player
            for (let ei = enemies.length - 1; ei >= 0; ei--) {
                const enemy = enemies[ei];
                if (isColliding(enemy, player)) {
                    if (!player.powerUps.shield) {
                        player.health -= 20;
                        updateHealthBar();
                        createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color);
                        if (player.health <= 0) { gameOver(); return; }
                    } else {
                        createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, '#4dabf7', 10);
                    }
                    returnToPool(enemy);
                    enemies.splice(ei, 1);
                }
            }

            // Boss hitting player
            if (boss && isColliding(boss, player)) {
                if (!player.powerUps.shield) {
                    player.health -= 30;
                    updateHealthBar();
                    if (player.health <= 0) { gameOver(); return; }
                } else {
                    createParticles(player.x + player.width/2, player.y + player.height/2, '#4dabf7', 20);
                }
            }
            
            // Player collecting power-ups
            powerUps.forEach((powerUp, index) => {
                if (isColliding(powerUp, player)) {
                    // Apply power-up effect
                    powerUpTypes[powerUp.type].effect();
                    
                    // Set timer for power-up
                    if (powerUpTypes[powerUp.type].duration > 0) {
                        player.powerUpTimers[powerUp.type] = powerUpTypes[powerUp.type].duration;
                    }
                    
                    // Create collection particles
                    createParticles(powerUp.x, powerUp.y, powerUp.color, 10);
                    
                    returnToPool(powerUp);
                    powerUps.splice(index, 1);
                }
            });
        }
        
        // Check if two objects are colliding
        function isColliding(obj1, obj2) {
            return obj1.x < obj2.x + obj2.width &&
                   obj1.x + obj1.width > obj2.x &&
                   obj1.y < obj2.y + obj2.height &&
                   obj1.y + obj1.height > obj2.y;
        }
        
        // Create particle explosion
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const particle = getFromPool(particlePool);
                particle.x = x;
                particle.y = y;
                particle.vx = (Math.random() - 0.5) * 8;
                particle.vy = (Math.random() - 0.5) * 8;
                particle.size = Math.random() * 4 + 1;
                particle.color = color;
                particle.life = 30;
                particle.maxLife = 30;
                particles.push(particle);
            }
        }
        
        // Create explosion
        function createExplosion(x, y, color) {
            const explosion = getFromPool(explosionPool);
            explosion.x = x;
            explosion.y = y;
            explosion.frame = 0;
            explosion.color = color;
            explosions.push(explosion);
            
            // Also create particles
            createParticles(x, y, color, 20);
        }
        
        // Update combo display
        function updateCombo() {
            const comboIndicator = document.getElementById('comboIndicator');
            document.getElementById('comboCount').textContent = combo;
            comboIndicator.classList.add('active');
        }
        
        // Draw game objects
        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 10, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars
            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw power-ups
            powerUps.forEach(powerUp => {
                ctx.save();
                ctx.translate(powerUp.x, powerUp.y);
                ctx.rotate(powerUp.rotation);
                
                // Outer glow
                ctx.fillStyle = `${powerUp.color}44`;
                ctx.beginPath();
                ctx.arc(0, 0, powerUp.width/2 + 5, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner circle
                ctx.fillStyle = powerUp.color;
                ctx.beginPath();
                ctx.arc(0, 0, powerUp.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Icon
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(powerUp.icon, 0, 0);
                
                ctx.restore();
            });
            
            // Draw player
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            
            // Draw ship body
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(0, -player.height/2);
            ctx.lineTo(-player.width/2, player.height/2);
            ctx.lineTo(-player.width/4, player.height/3);
            ctx.lineTo(0, player.height/4);
            ctx.lineTo(player.width/4, player.height/3);
            ctx.lineTo(player.width/2, player.height/2);
            ctx.closePath();
            ctx.fill();
            
            // Draw cockpit
            ctx.fillStyle = '#003366';
            ctx.beginPath();
            ctx.arc(0, 0, player.width/4, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw engine glow
            ctx.fillStyle = '#00ffff';
            ctx.globalAlpha = 0.5 + Math.random() * 0.5;
            ctx.beginPath();
            ctx.ellipse(0, player.height/2, player.width/4, player.height/4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            
            // Draw shield if active
            if (player.powerUps.shield) {
                ctx.strokeStyle = '#4dabf7';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.005) * 0.2;
                ctx.beginPath();
                ctx.arc(0, 0, player.width/2 + 10, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
            
            ctx.restore();
            
            // Draw bullets
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                
                // Add glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                ctx.shadowBlur = 0;
            });
            
            // Draw enemies
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                
                // Different shapes based on enemy type
                switch(enemy.type) {
                    case 'basic':
                        // Triangle shape
                        ctx.fillStyle = enemy.color;
                        ctx.beginPath();
                        ctx.moveTo(0, enemy.height/2);
                        ctx.lineTo(-enemy.width/2, -enemy.height/2);
                        ctx.lineTo(enemy.width/2, -enemy.height/2);
                        ctx.closePath();
                        ctx.fill();
                        break;
                        
                    case 'insect':
                        // Insect-like shape
                        ctx.fillStyle = enemy.color;
                        ctx.beginPath();
                        ctx.ellipse(0, 0, enemy.width/2, enemy.height/3, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Wings
                        ctx.fillStyle = `${enemy.color}88`;
                        ctx.beginPath();
                        ctx.ellipse(-enemy.width/2, 0, enemy.width/3, enemy.height/4, -Math.PI/6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.ellipse(enemy.width/2, 0, enemy.width/3, enemy.height/4, Math.PI/6, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'mechanical':
                        // Mechanical shape
                        ctx.fillStyle = enemy.color;
                        ctx.fillRect(-enemy.width/2, -enemy.height/2, enemy.width, enemy.height);
                        
                        // Details
                        ctx.fillStyle = '#2e3440';
                        ctx.fillRect(-enemy.width/3, -enemy.height/3, enemy.width/3, enemy.height/3);
                        ctx.fillRect(0, -enemy.height/3, enemy.width/3, enemy.height/3);
                        
                        // Eyes
                        ctx.fillStyle = '#ff3366';
                        ctx.beginPath();
                        ctx.arc(-enemy.width/4, 0, 3, 0, Math.PI * 2);
                        ctx.arc(enemy.width/4, 0, 3, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'shooter':
                        // Shooter shape
                        ctx.fillStyle = enemy.color;
                        ctx.beginPath();
                        ctx.arc(0, 0, enemy.width/2, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Core
                        ctx.fillStyle = '#2e3440';
                        ctx.beginPath();
                        ctx.arc(0, 0, enemy.width/4, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Eyes
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(-enemy.width/4, -enemy.height/4, 3, 0, Math.PI * 2);
                        ctx.arc(enemy.width/4, -enemy.height/4, 3, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                }
                
                // Health bar
                if (enemy.health < enemy.maxHealth) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(-enemy.width/2, -enemy.height/2 - 10, enemy.width, 4);
                    
                    ctx.fillStyle = '#ff3366';
                    ctx.fillRect(-enemy.width/2, -enemy.height/2 - 10, enemy.width * (enemy.health / enemy.maxHealth), 4);
                }
                
                ctx.restore();
            });
            
            // Draw boss
            if (boss) {
                ctx.save();
                ctx.translate(boss.x + boss.width/2, boss.y + boss.height/2);
                
                if (boss.type === 'destroyer') {
                    // Destroyer shape
                    ctx.fillStyle = boss.color;
                    ctx.beginPath();
                    ctx.moveTo(0, boss.height/2);
                    ctx.lineTo(-boss.width/2, 0);
                    ctx.lineTo(-boss.width/3, -boss.height/2);
                    ctx.lineTo(0, -boss.height/3);
                    ctx.lineTo(boss.width/3, -boss.height/2);
                    ctx.lineTo(boss.width/2, 0);
                    ctx.closePath();
                    ctx.fill();
                    
                    // Core
                    ctx.fillStyle = '#2e3440';
                    ctx.beginPath();
                    ctx.arc(0, 0, boss.width/4, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Eyes
                    ctx.fillStyle = '#ff3366';
                    ctx.beginPath();
                    ctx.arc(-boss.width/4, -boss.height/4, 5, 0, Math.PI * 2);
                    ctx.arc(boss.width/4, -boss.height/4, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Mouth
                    ctx.beginPath();
                    ctx.arc(0, boss.height/4, boss.width/3, 0, Math.PI);
                    ctx.fill();
                } else if (boss.type === 'mothership') {
                    // Mothership shape
                    ctx.fillStyle = boss.color;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, boss.width/2, boss.height/2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Core
                    ctx.fillStyle = '#2e3440';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, boss.width/3, boss.height/3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Details
                    ctx.fillStyle = '#ff00ff';
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI * 2 / 6) * i;
                        const x = Math.cos(angle) * boss.width/3;
                        const y = Math.sin(angle) * boss.height/3;
                        ctx.beginPath();
                        ctx.arc(x, y, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                ctx.restore();
            }
            
            // Draw enemy bullets
            enemyBullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x + bullet.width/2, bullet.y + bullet.height/2, bullet.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Add glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = bullet.color;
                ctx.beginPath();
                ctx.arc(bullet.x + bullet.width/2, bullet.y + bullet.height/2, bullet.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // Draw explosions
            explosions.forEach(explosion => {
                const progress = explosion.frame / explosion.maxFrames;
                const size = explosion.size * (1 + progress);
                const alpha = 1 - progress;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = explosion.color;
                ctx.beginPath();
                ctx.arc(explosion.x, explosion.y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
            
            // Draw particles
            particles.forEach(particle => {
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / particle.maxLife;
                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }
        
        // Game loop
        function gameLoop(currentTime) {
            update(currentTime);
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // Start game
        function startGame() {
            // Reset game state
            gameRunning = true;
            gamePaused = false;
            score = 0;
            wave = 1;
            combo = 0;
            comboTimer = 0;
            waveTransitioning = false;
            player.health = player.maxHealth;
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 150;
            player.fireRate = 5;
            player.speed = 0.2;
            player.powerUps = {
                rapidFire: false,
                shield: false,
                multiShot: false,
                speedBoost: false
            };
            player.powerUpTimers = {
                rapidFire: 0,
                shield: 0,
                multiShot: 0,
                speedBoost: 0
            };
            
            // Reset all objects
            bullets = [];
            enemyBullets = [];
            enemies = [];
            particles = [];
            powerUps = [];
            explosions = [];
            boss = null;
            
            // Reset object pools
            bulletPool.forEach(bullet => bullet.active = false);
            enemyBulletPool.forEach(bullet => bullet.active = false);
            enemyPool.forEach(enemy => enemy.active = false);
            particlePool.forEach(particle => particle.active = false);
            powerUpPool.forEach(powerUp => powerUp.active = false);
            explosionPool.forEach(explosion => explosion.active = false);
            
            // Reset UI
            document.getElementById('score').textContent = score;
            document.getElementById('wave').textContent = wave;
            document.getElementById('comboIndicator').classList.remove('active');
            document.getElementById('bossHealthContainer').style.display = 'none';
            
            // Hide menu
            document.getElementById('gameMenu').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.remove('active');
            
            // Initialize stars and create first wave
            initStars();
            createWave();
            
            // Start game loop
            lastTime = performance.now();
            gameLoop(lastTime);
        }
        
        // Game over
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.add('active');
        }
        
        // Update score display
        function updateScore() {
            document.getElementById('score').textContent = Math.floor(score);
        }
        
        // Update health bar
        function updateHealthBar() {
            const healthPercent = Math.max(0, player.health / player.maxHealth * 100);
            document.getElementById('healthBar').style.width = healthPercent + '%';
            
            // Change color based on health
            if (healthPercent > 60) {
                document.getElementById('healthBar').style.background = 'linear-gradient(90deg, #00ff88, #00ffff)';
            } else if (healthPercent > 30) {
                document.getElementById('healthBar').style.background = 'linear-gradient(90deg, #ffd43b, #ffec99)';
            } else {
                document.getElementById('healthBar').style.background = 'linear-gradient(90deg, #ff3366, #ff6b6b)';
            }
        }
        
        // Update boss health bar
        function updateBossHealthBar() {
            if (!boss) return;
            
            const healthPercent = Math.max(0, boss.health / boss.maxHealth * 100);
            document.getElementById('bossHealthBar').style.width = healthPercent + '%';
        }
        
        // Touch controls
        function handleTouchStart(e) {
            e.preventDefault();
            touchActive = true;
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchX = touch.clientX - rect.left;
            touchY = touch.clientY - rect.top;
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            touchX = touch.clientX - rect.left;
            touchY = touch.clientY - rect.top;
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            touchActive = false;
        }
        
        // Mouse controls (for desktop testing)
        function handleMouseDown(e) {
            touchActive = true;
            
            const rect = canvas.getBoundingClientRect();
            touchX = e.clientX - rect.left;
            touchY = e.clientY - rect.top;
        }
        
        function handleMouseMove(e) {
            if (touchActive) {
                const rect = canvas.getBoundingClientRect();
                touchX = e.clientX - rect.left;
                touchY = e.clientY - rect.top;
            }
        }
        
        function handleMouseUp(e) {
            touchActive = false;
        }
        
        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // Touch controls
        canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
        canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
        canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
        
        // Mouse controls (for desktop testing)
        canvas.addEventListener('mousedown', handleMouseDown);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mouseup', handleMouseUp);
        
        // Settings button
        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('settingsOverlay').classList.add('active');
        });
        document.getElementById('settingsCloseBtn').addEventListener('click', () => {
            document.getElementById('settingsOverlay').classList.remove('active');
        });

        // ── Audio & Haptics ───────────────────────────────────────────────
        let audioCtx = null;

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // Resume if suspended (mobile requires user gesture first)
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function getVolume() {
            return document.getElementById('volume').value / 100;
        }

        // Generic tone player
        function playTone({ frequency = 440, type = 'sine', duration = 0.1, volumeScale = 1,
                            freqEnd = null, attack = 0.005, decay = 0.05 }) {
            try {
                const ctx = getAudioCtx();
                const vol = getVolume() * volumeScale;
                if (vol === 0) return;

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.type = type;
                osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                if (freqEnd !== null) {
                    osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + duration);
                }

                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + attack);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration + 0.01);
            } catch(e) {}
        }

        // Shoot sound — short high-pitched laser zap
        function playShootSound() {
            if (!document.getElementById('sfxShoot').checked) return;
            playTone({ frequency: 880, freqEnd: 220, type: 'sawtooth', duration: 0.08, volumeScale: 0.3 });
        }

        // Enemy fire sound — lower, slightly different pitch
        function playEnemyFireSound() {
            if (!document.getElementById('sfxEnemyFire').checked) return;
            playTone({ frequency: 320, freqEnd: 160, type: 'square', duration: 0.1, volumeScale: 0.2 });
        }

        // Enemy destroy — proper BOOM: sub bass punch + noise crack + pitch tail
        function playDestroySound() {
            if (!document.getElementById('sfxExplosion').checked) return;
            try {
                const ctx = getAudioCtx();
                const vol = getVolume();
                if (vol === 0) return;

                // Layer 1: Sub bass thump (the "punch")
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(180, ctx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.25);
                gain1.gain.setValueAtTime(vol * 1.2, ctx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc1.start(ctx.currentTime);
                osc1.stop(ctx.currentTime + 0.26);

                // Layer 2: Mid crunch oscillator
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sawtooth';
                osc2.frequency.setValueAtTime(120, ctx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.2);
                gain2.gain.setValueAtTime(vol * 0.6, ctx.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);
                osc2.start(ctx.currentTime);
                osc2.stop(ctx.currentTime + 0.21);

                // Layer 3: White noise crack
                const bufSize = ctx.sampleRate * 0.18;
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
                const noise = ctx.createBufferSource();
                noise.buffer = buf;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = 800;
                noiseFilter.Q.value = 0.5;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(vol * 0.8, ctx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                noise.start(ctx.currentTime);
                noise.stop(ctx.currentTime + 0.18);

            } catch(e) {}
        }

        // Boss destroy — MASSIVE ATOM BOMB: deep rumble + explosion layers + long decay
        function playBossDestroySound() {
            if (!document.getElementById('sfxExplosion').checked) return;
            try {
                const ctx = getAudioCtx();
                const vol = getVolume();
                if (vol === 0) return;

                // Layer 1: Deep sub bass BOOM
                const sub = ctx.createOscillator();
                const subGain = ctx.createGain();
                sub.type = 'sine';
                sub.frequency.setValueAtTime(80, ctx.currentTime);
                sub.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 1.2);
                subGain.gain.setValueAtTime(vol * 2.0, ctx.currentTime);
                subGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
                sub.connect(subGain);
                subGain.connect(ctx.destination);
                sub.start(ctx.currentTime);
                sub.stop(ctx.currentTime + 1.21);

                // Layer 2: Low rumble distortion
                const rumble = ctx.createOscillator();
                const rumbleGain = ctx.createGain();
                rumble.type = 'sawtooth';
                rumble.frequency.setValueAtTime(60, ctx.currentTime);
                rumble.frequency.exponentialRampToValueAtTime(15, ctx.currentTime + 0.9);
                rumbleGain.gain.setValueAtTime(vol * 1.2, ctx.currentTime);
                rumbleGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.9);
                rumble.connect(rumbleGain);
                rumbleGain.connect(ctx.destination);
                rumble.start(ctx.currentTime);
                rumble.stop(ctx.currentTime + 0.91);

                // Layer 3: Mid punch
                const mid = ctx.createOscillator();
                const midGain = ctx.createGain();
                mid.type = 'square';
                mid.frequency.setValueAtTime(200, ctx.currentTime);
                mid.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.4);
                midGain.gain.setValueAtTime(vol * 0.9, ctx.currentTime);
                midGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                mid.connect(midGain);
                midGain.connect(ctx.destination);
                mid.start(ctx.currentTime);
                mid.stop(ctx.currentTime + 0.41);

                // Layer 4: Full spectrum noise explosion
                const bufSize = ctx.sampleRate * 1.0;
                const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
                const noise = ctx.createBufferSource();
                noise.buffer = buf;
                const noiseFilter = ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.value = 2000;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(vol * 1.5, ctx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(vol * 0.3, ctx.currentTime + 0.1);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                noise.start(ctx.currentTime);
                noise.stop(ctx.currentTime + 1.0);

            } catch(e) {}
        }

        // Haptic vibration
        function vibrate(pattern) {
            if (!document.getElementById('haptics').checked) return;
            if (navigator.vibrate) navigator.vibrate(pattern);
        }
        
        // Initialize object pools
        initObjectPools();
    </script>
