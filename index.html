<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Scorpio Space Shooter - Play Now!">
    <link rel="manifest" href="data:application/json,{\"name\":\"Scorpio Shooter\",\"short_name\":\"Scorpio\",\"start_url\":\"/\",\"display\":\"fullscreen\",\"background_color\":\"#000000\",\"theme_color\":\"#00ffff\"}">
    <title>Scorpio Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            font-family: Arial, sans-serif;
            color: #fff;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .stats {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.8;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #00ffff;
        }

        .combo {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
            display: none;
            font-weight: bold;
        }

        .combo.active {
            display: block;
        }

        .menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #001a4d, #004080, #001a33);
            z-index: 1000;
        }

        .menu.hidden {
            display: none;
        }

        .menu h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            letter-spacing: 3px;
        }

        .menu p {
            font-size: 18px;
            color: #00ffff;
            margin-bottom: 40px;
        }

        .menu button {
            margin: 10px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #6600cc, #3300ff);
            color: white;
            border: 2px solid #00ffff;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            pointer-events: all;
        }

        .menu button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            background: linear-gradient(135deg, #7700dd, #4411ff);
        }

        .menu button:active {
            transform: translateY(-1px);
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            z-index: 999;
        }

        .game-over.active {
            display: flex;
        }

        .game-over h2 {
            font-size: 60px;
            color: #ff3366;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff3366;
            letter-spacing: 2px;
        }

        .game-over p {
            font-size: 24px;
            color: #00ffff;
            margin: 10px;
            font-weight: bold;
        }

        .game-over button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #6600cc, #3300ff);
            color: white;
            border: 2px solid #00ffff;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: all;
        }

        .game-over button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        .wave-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
            pointer-events: none;
            display: none;
            z-index: 500;
        }

        .wave-banner.show {
            display: block;
            animation: wavePulse 2s ease-out;
        }

        @keyframes wavePulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }

        .powerup-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .powerup-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0.3;
            transition: all 0.3s;
        }

        .powerup-icon.active {
            opacity: 1;
            box-shadow: 0 0 15px currentColor;
            border-color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui">
        <div class="stats">
            <div>SCORE: <span id="score">0</span></div>
            <div>HEALTH: <span id="health">100</span>%</div>
            <div>WAVE: <span id="wave">1</span></div>
        </div>
        <div class="combo" id="combo">🔥 COMBO ×<span id="comboVal">0</span></div>
        <div class="powerup-indicator">
            <div class="powerup-icon" id="p1">⚡</div>
            <div class="powerup-icon" id="p2">🛡️</div>
            <div class="powerup-icon" id="p3">🔱</div>
            <div class="powerup-icon" id="p4">💨</div>
        </div>
        <div class="wave-banner" id="waveBanner"></div>
    </div>

    <div class="menu" id="menu">
        <h1>⚡ SCORPIO ⚡</h1>
        <p>SPACE SHOOTER</p>
        <button id="startBtn">▶ START</button>
        <button id="settingsBtn">⚙ SETTINGS</button>
    </div>

    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>SCORE: <span id="finalScore">0</span></p>
        <p>WAVE: <span id="finalWave">1</span></p>
        <button id="restartBtn">🔄 PLAY AGAIN</button>
    </div>

    <script>
        'use strict';
        
        console.log('🎮 Scorpio Space Shooter Initializing...');

        // ============================================================================
        // CANVAS & CONTEXT
        // ============================================================================
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============================================================================
        // GAME STATE
        // ============================================================================
        
        const game = {
            running: false,
            score: 0,
            wave: 1,
            combo: 0,
            maxCombo: 0,
            frameCount: 0
        };

        const player = {
            x: 0,
            y: 0,
            w: 50,
            h: 50,
            spd: 0.25,
            hp: 100,
            maxHp: 100,
            fireRate: 6,
            fireCount: 0,
            powerUps: {}
        };

        let enemies = [];
        let bullets = [];
        let enemyBullets = [];
        let stars = [];
        let boss = null;

        // ============================================================================
        // STARS BACKGROUND
        // ============================================================================
        
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: Math.random() * 2,
                    vy: Math.random() + 0.5,
                    br: Math.random() * 0.5 + 0.3
                });
            }
        }

        // ============================================================================
        // INPUT HANDLING
        // ============================================================================
        
        let mouseX = 0, mouseY = 0, mouseDown = false;

        document.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.addEventListener('mousedown', () => {
            if (game.running) mouseDown = true;
        });

        document.addEventListener('mouseup', () => {
            mouseDown = false;
        });

        document.addEventListener('touchmove', e => {
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        }, {passive: true});

        document.addEventListener('touchstart', () => {
            if (game.running) mouseDown = true;
        }, {passive: true});

        document.addEventListener('touchend', () => {
            mouseDown = false;
        }, {passive: true});

        // ============================================================================
        // BUTTON HANDLERS
        // ============================================================================
        
        document.getElementById('startBtn').addEventListener('click', () => {
            console.log('🎮 START GAME');
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('gameOver').classList.remove('active');
            
            game.running = true;
            game.score = 0;
            game.wave = 1;
            game.combo = 0;
            
            player.x = canvas.width / 2 - player.w / 2;
            player.y = canvas.height - 100;
            player.hp = 100;
            player.fireCount = 0;
            player.powerUps = {};
            
            enemies = [];
            bullets = [];
            enemyBullets = [];
            
            createWave();
            gameLoop();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('startBtn').click();
        });

        document.getElementById('settingsBtn').addEventListener('click', () => {
            alert('⚙️ SETTINGS\n\n✓ Sound: ON\n✓ Vibration: ON\n✓ FPS: 60\n\nMore soon!');
        });

        // ============================================================================
        // CREATE WAVE
        // ============================================================================
        
        function createWave() {
            enemies = [];
            boss = null;
            game.combo = 0;

            const count = Math.min(5 + game.wave * 2, 40);
            const mult = 1 + game.wave * 0.15;

            for (let i = 0; i < count; i++) {
                const types = [
                    { w: 40, h: 40, hp: 2, spd: 2, col: '#ff6b6b' },
                    { w: 45, h: 35, hp: 3, spd: 2.5, col: '#ffd43b' },
                    { w: 50, h: 50, hp: 5, spd: 1, col: '#ff00ff' }
                ];
                const type = types[Math.floor(Math.random() * types.length)];
                
                enemies.push({
                    x: Math.random() * (canvas.width - type.w),
                    y: -100,
                    w: type.w,
                    h: type.h,
                    hp: Math.ceil(type.hp * mult),
                    maxHp: Math.ceil(type.hp * mult),
                    spd: type.spd,
                    col: type.col,
                    pts: Math.floor((type.hp * 10) * mult),
                    fr: 80,
                    fc: Math.random() * 80
                });
            }

            if (game.wave % 5 === 0) {
                boss = {
                    x: canvas.width / 2 - 100,
                    y: 50,
                    w: 200,
                    h: 200,
                    hp: 100 * (1 + game.wave * 0.1),
                    maxHp: 100 * (1 + game.wave * 0.1),
                    spd: 0.5,
                    col: '#ff3366',
                    pts: 500
                };
            }

            showWaveBanner(`WAVE ${game.wave}`);
        }

        // ============================================================================
        // WAVE BANNER
        // ============================================================================
        
        function showWaveBanner(text) {
            const banner = document.getElementById('waveBanner');
            banner.textContent = text;
            banner.classList.remove('show');
            setTimeout(() => banner.classList.add('show'), 10);
        }

        // ============================================================================
        // UPDATE UI
        // ============================================================================
        
        function updateUI() {
            document.getElementById('score').textContent = Math.floor(game.score);
            document.getElementById('health').textContent = Math.max(0, Math.floor(player.hp));
            document.getElementById('wave').textContent = game.wave;
            
            if (game.combo > 0) {
                document.getElementById('combo').classList.add('active');
                document.getElementById('comboVal').textContent = game.combo;
            } else {
                document.getElementById('combo').classList.remove('active');
            }
        }

        // ============================================================================
        // MAIN GAME LOOP
        // ============================================================================
        
        function gameLoop() {
            if (!game.running) return;
            requestAnimationFrame(gameLoop);

            // CLEAR
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // DRAW STARS
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                star.y += star.vy;
                if (star.y > canvas.height) star.y = -10;
                ctx.globalAlpha = star.br;
                ctx.fillRect(star.x, star.y, star.s, star.s);
            });
            ctx.globalAlpha = 1;

            // UPDATE PLAYER
            if (mouseDown) {
                const dx = mouseX - (player.x + player.w / 2);
                const dy = mouseY - (player.y + player.h / 2);
                const d = Math.hypot(dx, dy);
                if (d > 20) {
                    player.x += (dx / d) * player.spd * 8;
                    player.y += (dy / d) * player.spd * 8;
                }
            }
            player.x = Math.max(0, Math.min(player.x, canvas.width - player.w));
            player.y = Math.max(0, Math.min(player.y, canvas.height - player.h));

            // DRAW PLAYER
            ctx.save();
            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(20, 20);
            ctx.lineTo(0, 10);
            ctx.lineTo(-20, 20);
            ctx.closePath();
            ctx.fill();
            if (player.powerUps.shield) {
                ctx.strokeStyle = 'rgba(77, 171, 247, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 35, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();

            // FIRE BULLETS
            player.fireCount++;
            if (player.fireCount >= player.fireRate) {
                if (player.powerUps.multiShot) {
                    for (let angle of [-20, 0, 20]) {
                        const rad = angle * Math.PI / 180;
                        bullets.push({
                            x: player.x + player.w / 2,
                            y: player.y,
                            vx: Math.sin(rad) * 7,
                            vy: -9
                        });
                    }
                } else {
                    bullets.push({
                        x: player.x + player.w / 2,
                        y: player.y,
                        vx: 0,
                        vy: -9
                    });
                }
                player.fireCount = 0;
            }

            // UPDATE BULLETS
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                
                if (b.y < 0) {
                    bullets.splice(i, 1);
                } else {
                    ctx.fillStyle = '#00ffff';
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(b.x - 2, b.y, 4, 12);
                    ctx.shadowBlur = 0;
                }
            }

            // UPDATE ENEMIES
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.spd;
                e.fc++;

                if (e.fc >= e.fr) {
                    enemyBullets.push({
                        x: e.x + e.w / 2,
                        y: e.y + e.h,
                        vy: 4
                    });
                    e.fc = 0;
                }

                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                } else {
                    ctx.fillStyle = e.col;
                    ctx.fillRect(e.x, e.y, e.w, e.h);
                    
                    // Health bar
                    const hpPct = e.hp / e.maxHp;
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(e.x, e.y - 6, e.w * hpPct, 3);
                }
            }

            // UPDATE ENEMY BULLETS
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.y += b.vy;
                
                if (b.y > canvas.height) {
                    enemyBullets.splice(i, 1);
                } else {
                    ctx.fillStyle = '#ff3366';
                    ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
                }
            }

            // COLLISION: Bullets vs Enemies
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                        e.hp--;
                        bullets.splice(i, 1);
                        if (e.hp <= 0) {
                            game.score += e.pts;
                            game.combo++;
                            enemies.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            // COLLISION: Enemy bullets vs Player
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                if (b.x > player.x && b.x < player.x + player.w &&
                    b.y > player.y && b.y < player.y + player.h) {
                    if (!player.powerUps.shield) {
                        player.hp -= 10;
                    }
                    enemyBullets.splice(i, 1);
                }
            }

            // DRAW BOSS
            if (boss) {
                ctx.fillStyle = boss.col;
                ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                
                const hpPct = boss.hp / boss.maxHp;
                ctx.fillStyle = '#ff3366';
                ctx.fillRect(boss.x + 10, boss.y - 15, (boss.w - 20) * hpPct, 8);
            }

            // UPDATE UI
            updateUI();

            // CHECK GAME OVER
            if (player.hp <= 0) {
                game.running = false;
                document.getElementById('finalScore').textContent = Math.floor(game.score);
                document.getElementById('finalWave').textContent = game.wave;
                document.getElementById('gameOver').classList.add('active');
                console.log(`📊 GAME OVER - Score: ${game.score}, Wave: ${game.wave}`);
                return;
            }

            // NEXT WAVE
            if (enemies.length === 0 && !boss) {
                game.wave++;
                createWave();
            }
        }

        // ============================================================================
        // INIT
        // ============================================================================
        
        initStars();
        console.log('✅ Game ready to play!');
    </script>
</body>
</html>
